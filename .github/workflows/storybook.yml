# Build the Storybook static site and publish it to GitHub Pages.
# Pages serves the site once the repository is public (free plan).
name: Deploy Storybook to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      # npm install, not npm ci: the lockfile is generated on Windows and omits
      # the Linux-only native binding subtree (and its @emnapi/runtime peer),
      # which strict npm ci rejects. install reconciles the gap on the runner.
      # This job only builds and publishes Storybook, so byte-for-byte lock
      # enforcement is not needed here.
      - run: npm install --no-audit --no-fund
      - run: npm run build-storybook
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static
      - id: deploy
        uses: actions/deploy-pages@v4
