<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Client UI</title>
    <style>
      /* Fill the webresource iframe; the shell owns everything inside #container. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      #container {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script src="<%= scriptName %>?v=<%= cacheBust %>"></script>
    <script>
      window.ClientUI.bootstrap();
    </script>
  </body>
</html>
