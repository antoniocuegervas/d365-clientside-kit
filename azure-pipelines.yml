# Reference pipeline for the D365 client-side UI kit. This repo's quality
# gate is deliberately local (`npm run verify`; see docs/deployment.md, "CI"),
# so this definition is connected to no service here: it is committed for
# forks that want hosted CI. Two stages:
#
# - Verify mirrors `npm run verify` locally; PCF builds run when shared/
#   changed (or on manual runs), since PCFs consume shared/ as source. The
#   root install is npm install, not npm ci: the Windows-generated lockfile
#   omits Linux-only optional binaries, and strict npm ci rejects that gap on
#   a Linux runner (.github/workflows/storybook.yml records the same reason).
# - Package builds the release artifact: the managed solution zip from
#   deployment/solution (the five PCF controls plus the shell webresources),
#   from the repo alone. No org connection and no secrets anywhere in the
#   pipeline; importing the zip stays a human step on a disposable org.

trigger:
  branches:
    include: [master, release/*, feature/*]

pr:
  branches:
    include: [master, release/*]

stages:
  - stage: Verify
    displayName: Verify (the local gate)
    jobs:
      - job: Verify
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "24.x" # same line the engines field and .nvmrc pin
            displayName: Use Node 24

          - script: npm install
            displayName: Install main kit dependencies

          - script: npm run check:pcf-floor
            displayName: PCF platform-floor check (first step of verify)

          - script: npm run lint
            displayName: Lint (incl. presentational restricted-imports rule)

          - script: npm run typecheck
            displayName: Typecheck (single TS version, strict)

          - script: npm run build
            displayName: Build clientui + clienthooks bundles

          - script: npm run test
            displayName: Unit tests

          - script: npm run smoke
            displayName: Smoke tests, modern + legacy host mocks against built bundles

          - script: npm run build-storybook
            displayName: Storybook build (fixture data only)

          - script: |
              set -e
              if [ "$(Build.Reason)" = "Manual" ]; then
                CHANGED=1
              else
                git fetch origin master --depth=50 || true
                # Root dependency changes can break PCF builds too, so the gate watches
                # the lockfile and manifest beside the source folders.
                CHANGED=$(git diff --name-only origin/master...HEAD -- shared/ pcfs/ package.json package-lock.json | wc -l)
              fi
              if [ "$CHANGED" -gt 0 ]; then
                echo "shared/, pcfs/, or root dependencies changed, building all sample PCFs (conditional gate)"
                for pcf in pcfs/*/; do
                  echo "=== $pcf"
                  # Production mode: the deployable artifact shape (debug bundles are
                  # nearly ten times larger and must never ship).
                  (cd "$pcf" && npm ci && npm run build -- --buildMode production)
                done
              else
                echo "No shared/, pcfs/, or root dependency changes, skipping PCF builds"
              fi
            displayName: Conditional PCF builds (production) when shared or deps change

          - publish: dist
            artifact: webresources
            displayName: Publish webresource artifacts

  - stage: Package
    displayName: Package (managed solution artifact)
    dependsOn: Verify
    jobs:
      - job: Solution
        # Windows agent: the documented local path is dotnet build on the
        # solution project, and the PowerApps MSBuild targets are exercised on
        # Windows; the artifact stays identical to a local Release build.
        pool:
          vmImage: windows-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "24.x"
            displayName: Use Node 24

          - script: npm install
            displayName: Install main kit dependencies

          - script: npm run build
            displayName: Build webresource artifacts into dist/

          # Builds each referenced PCF in Release (production bundles; the
          # targets npm-install each project themselves) and packs them with
          # the dist/ webresources into the managed zip. Publisher, prefix,
          # and version come from kit.config.json and package.json at build
          # time (deployment/solution/render-src.mjs).
          - script: dotnet build deployment/solution -c Release
            displayName: Build the managed solution zip

          - publish: deployment/solution/bin/Release/D365UIKit.zip
            artifact: managed-solution
            displayName: Publish managed solution artifact
