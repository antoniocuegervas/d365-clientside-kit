# CI for the D365 client-side UI kit.
# Steps mirror `npm run verify` locally; PCF builds run when shared/ changed
# (or on manual runs), since PCFs consume shared/ as source.

trigger:
  branches:
    include: [master, release/*, feature/*]

pr:
  branches:
    include: [master, release/*]

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "24.x" # same line the engines field and .nvmrc pin
    displayName: Use Node 24

  - script: npm ci
    displayName: Install main kit dependencies

  - script: npm run check:pcf-floor
    displayName: PCF platform-floor check (first step of verify)

  - script: npm run lint
    displayName: Lint (incl. presentational restricted-imports rule)

  - script: npm run typecheck
    displayName: Typecheck (single TS version, strict)

  - script: npm run build
    displayName: Build clientui + clienthooks bundles

  - script: npm run test
    displayName: Unit tests

  - script: npm run smoke
    displayName: Smoke tests, modern + legacy host mocks against built bundles

  - script: npm run build-storybook
    displayName: Storybook build (fixture data only)

  - script: |
      set -e
      if [ "$(Build.Reason)" = "Manual" ]; then
        CHANGED=1
      else
        git fetch origin master --depth=50 || true
        # Root dependency changes can break PCF builds too, so the gate watches
        # the lockfile and manifest beside the source folders.
        CHANGED=$(git diff --name-only origin/master...HEAD -- shared/ pcfs/ package.json package-lock.json | wc -l)
      fi
      if [ "$CHANGED" -gt 0 ]; then
        echo "shared/, pcfs/, or root dependencies changed, building all sample PCFs (conditional gate)"
        for pcf in pcfs/*/; do
          echo "=== $pcf"
          # Production mode: the deployable artifact shape (debug bundles are
          # nearly ten times larger and must never ship).
          (cd "$pcf" && npm ci && npm run build -- --buildMode production)
        done
      else
        echo "No shared/, pcfs/, or root dependency changes, skipping PCF builds"
      fi
    displayName: Conditional PCF builds (production) when shared or deps change

  - publish: dist
    artifact: webresources
    displayName: Publish webresource artifacts
